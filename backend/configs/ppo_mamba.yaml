extends: base.yaml

algo: ppo
network: mamba

hyperparams:
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  ppo_epochs: 4
  rollout_steps: 2048

net_params:
  hidden_dim: 128
  state_dim: 16
  num_layers: 2
  conv_kernel: 4
  expand_factor: 2
