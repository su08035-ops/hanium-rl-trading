extends: base.yaml

algo: iqn
network: patchtst

hyperparams:
  lr: 0.0003
  gamma: 0.99
  n_quantiles: 32
  embedding_dim: 64
  kappa: 1.0
  cvar_alpha: 1.0
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 0.995
  target_update: 10
  replay_size: 10000

net_params:
  hidden_dim: 128
  patch_len: 5
  stride: 5
  num_heads: 4
  num_layers: 2
  dropout: 0.1
